<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabellone Completo Turni</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; }
        .container { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); overflow-x: auto; }
        h2 { color: #1a73e8; text-align: center; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; }
        th { background: #1a73e8; color: white; padding: 12px; text-transform: uppercase; font-size: 14px; sticky: top; }
        td { border: 1px solid #ddd; padding: 10px; text-align: center; font-size: 14px; font-weight: 500; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        tr:hover { background-color: #f1f5ff; }
        .btn-back { display: inline-block; margin-bottom: 20px; padding: 10px 20px; background: #6c757d; color: white; text-decoration: none; border-radius: 5px; font-weight: bold; }
        .status { text-align: center; font-size: 12px; color: #888; }
    </style>
</head>
<body>

<a href="index.html" class="btn-back">← TORNA AL LOGIN</a>

<div class="container">
    <h2>Tabellone Completo Orari</h2>
    <p id="stato" class="status">Sincronizzazione dati in corso...</p>
    
    <table id="tabellaCompleta">
        <thead id="testata"></thead>
        <tbody id="corpo"></tbody>
    </table>
</div>

<script>
    // Link al Foglio ORARI (gid=0)
    const LINK_ORARI_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTyBo6kFgjH-cfZZa6MqX_xs8AAxcTVO04So_JFoDDGuk-7hwS3-lqer0Wivgi_zelazFV4Yk5syeLn/pub?gid=0&single=true&output=csv";

    window.onload = async function() {
        try {
            // Aggiungiamo un timestamp per evitare la cache del browser
            const response = await fetch(LINK_ORARI_CSV + "&cb=" + Date.now());
            const text = await response.text();
            const dati = trasformaCSV(text);
            
            costruisciTabella(dati);
            document.getElementById('stato').innerText = "Ultimo aggiornamento: " + new Date().toLocaleTimeString();
        } catch (err) {
            document.getElementById('stato').innerText = "Errore nel caricamento del tabellone.";
            console.error(err);
        }
    };

    function trasformaCSV(testo) {
        const righe = testo.split(/\r?\n/);
        return righe.map(riga => {
            return riga.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(cella => 
                cella.replace(/^"|"$/g, '').trim()
            );
        });
    }

    function costruisciTabella(dati) {
        const testata = document.getElementById('testata');
        const corpo = document.getElementById('corpo');
        
        testata.innerHTML = "";
        corpo.innerHTML = "";

        dati.forEach((riga, index) => {
            // Se la riga è vuota o ha solo una cella vuota, saltala
            if (riga.length <= 1 && !riga[0]) return;

            const tr = document.createElement('tr');
            
            riga.forEach(cella => {
                const elemento = (index === 0) ? document.createElement('th') : document.createElement('td');
                
                // Formattiamo il testo: sostituiamo le virgole con a capo per pulizia
                elemento.innerHTML = cella.replace(/,/g, "<br>").replace("RIPOSO", "<span style='color:#999'>RIPOSO</span>");
                tr.appendChild(elemento);
            });

            if (index === 0) {
                testata.appendChild(tr);
            } else {
                corpo.appendChild(tr);
            }
        });
    }
</script>

</body>
</html>
